[build]
  base = "frontend"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_BASE_URL = "/api"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Proxy /api/* to the Render backend so the browser sees same-origin requests
# (no CORS needed). Must be declared here — the plugin owns _redirects.
[[redirects]]
  from = "/api/*"
  to = "https://automate-backend-qfj5.onrender.com/api/:splat"
  status = 200
  force = true
